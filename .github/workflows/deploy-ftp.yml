name: Deploy PHP Portal

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.FTP_HOST != '' && secrets.FTP_USERNAME != '' && secrets.FTP_PASSWORD != '' }}
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to hosting over FTP
        run: |
          PORT="${FTP_PORT:-21}"
          TARGET_DIR="${FTP_SERVER_DIR:-public_html}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow yes
          set ftp:passive-mode true
          set ssl:verify-certificate no
          set net:max-retries 2
          set net:timeout 20
          mirror -R --delete --verbose \
            --exclude-glob .git* \
            --exclude-glob .github \
            --exclude-glob .DS_Store \
            . "$TARGET_DIR"
          bye
          EOF
